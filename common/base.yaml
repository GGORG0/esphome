substitutions:
  device_name: REPLACEME
  friendly_name: REPLACEME

  ota_password: REPLACEME
  api_key: REPLACEME

# ---

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

logger:

wifi:
  id: base_wifi
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${friendly_name}_AP
    password: !secret ap_password
  reboot_timeout: 5min
  min_auth_mode: WPA2
  fast_connect: true

api:
  id: native_api
  encryption:
    key: ${api_key}

ota:
  - platform: esphome
    id: esphome_ota
    password: ${ota_password}

web_server:
  port: 80
  version: 3

captive_portal:

mdns:

# ---

button:
  - platform: restart
    name: Restart
    icon: mdi:restart
    entity_category: diagnostic
  - platform: factory_reset
    name: Factory Reset
    icon: mdi:restart-alert
    entity_category: diagnostic
  - platform: template
    name: Save Preferences
    icon: mdi:content-save
    entity_category: diagnostic
    on_press:
      - lambda: global_preferences->sync();

debug:
  update_interval: 30s

text_sensor:
  - platform: debug
    reset_reason:
      name: Reset Reason
      icon: mdi:restart
  - platform: wifi_info
    ip_address:
      name: IP Address
      icon: mdi:ip-network

sensor:
  - platform: uptime
    name: Uptime
    icon: mdi:timer-outline
    update_interval: 30s
  - platform: wifi_signal
    name: Wi-Fi Signal
    icon: mdi:wifi
    update_interval: 60s
  - platform: debug
    free:
      name: Free Heap
      icon: mdi:memory

time:
  - id: sntp_time
    platform: sntp
    timezone: Europe/Warsaw
